<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title>ESPHome firmware flasher</title>
    <meta name="description" content="Flash ESPHome firmware using your web browser" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .hidden {
            display: none !important;
        }
    </style>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
</head>

<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>ESPHome firmware flasher</strong></li>
        </ul>
        <ul>
            <li>
                <a href="https://github.com/Nerivec/esphome-firmware-builder/releases">Firmware Releases</a>
            </li>
            <li>
                <a href="https://github.com/Nerivec/esphome-firmware-builder">Github</a>
            </li>
            <li>
                <a href="https://www.buymeacoffee.com/Nerivec" target="_blank" class="button is-ghost">
                    <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee"
                        class="image" style="max-height: 2rem;">
                </a>
            </li>
        </ul>
    </nav>
    <header class="container-fluid">
        <p>Flash ESPHome firmware using your web browser.</p>
    </header>

    <main class="container-fluid">
        <fieldset>
            <legend>Select your firmware type</legend>
            <label>
                <select name="fw_type">
                    <option value="zigbee_ncp" selected>zigbee_ncp</option>
                    <option value="openthread">openthread</option>
                </select>
            </label>
        </fieldset>
        <fieldset>
            <legend>Select your baudrate</legend>
            <label>
                <select name="baudrate">
                    <option value="115200">115200</option>
                    <option value="460800" selected>460800</option>
                    <option value="921600">921600</option>
                </select>
            </label>
        </fieldset>
        <fieldset>
            <legend>Select your device</legend>
            <label>
                <input type="radio" name="device" value="smlight_slzb06" />
                SMLight SLZB06 or SLZB06P7 or SLZB06P10
            </label>
            <label>
                <input type="radio" name="device" value="smlight_slzb06m" />
                SMLight SLZB06M or SLZB06MG24
            </label>
            <label>
                <input type="radio" name="device" value="tubeszb_mgm24" />
                TubesZB MGM24
            </label>
        </fieldset>
        <fieldset aria-readonly="true">
            <legend>Selected firmware</legend>
            <input name="manifest" type="text" readonly />
        </fieldset>
        <esp-web-install-button class="hidden"></esp-web-install-button>
    </main>

    <footer class="container-fluid">
        Installer powered by <a href="https://esphome.github.io/esp-web-tools/">ESP Web Tools</a> and <a
            href="https://picocss.com/">Pico CSS</a>.
    </footer>
    <script>
        const espButton = document.querySelector('esp-web-install-button');
        const fwType = document.querySelector('select[name="fw_type"]');
        const baudrate = document.querySelector('select[name="baudrate"]');
        const devices = document.querySelectorAll('input[name="device"]');
        const manifestP = document.querySelector('input[name="manifest"]');
        let fwTypeValue = fwType.value;
        let baudrateValue = baudrate.value;
        let deviceValue = undefined;

        const onChange = () => {
            if (fwTypeValue && baudrateValue && deviceValue) {
                const manifest = `./${deviceValue}_${fwTypeValue}_${baudrateValue}.json`;

                manifestP.value = manifest;
                espButton.manifest = manifest;
                espButton.classList.remove('hidden');
            } else {
                espButton.classList.add('hidden');
            }
        };

        fwType.addEventListener("change", (e) => {
            fwTypeValue = e.target.value;

            onChange();
        });
        baudrate.addEventListener("change", (e) => {
            baudrateValue = e.target.value;

            onChange();
        });
        devices.forEach((device) => device.addEventListener("change", (e) => {
            deviceValue = e.target.value;

            onChange();
        }));
    </script>
</body>

</html>
